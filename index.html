<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Agro Sustentável - Agrinho 2026</title>
    <style>
        /* Estilização Geral do Site */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top, #d3f0c8, #eef5ed 40%, #f9f7ef 100%);
            color: #2f4f21;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            color: #2b5a2b;
        }

        header h1 {
            font-size: 2.5rem;
            letter-spacing: 0.03em;
            margin-bottom: 10px;
        }

        header p {
            margin: 6px 0;
            font-size: 1rem;
            color: #4b6a42;
        }

        /* Container do Simulador */
        .simulador-container {
            background-color: #fbfff4;
            border-radius: 20px;
            box-shadow: 0 18px 40px rgba(43, 60, 26, 0.14);
            padding: 30px;
            max-width: 620px;
            width: 100%;
            border: 1px solid rgba(68, 103, 44, 0.12);
            background-image: radial-gradient(circle at top left, rgba(255,255,255,0.8) 8%, transparent 9%),
                              radial-gradient(circle at bottom right, rgba(208,233,181,0.65) 12%, transparent 13%);
        }

        /* Painel de Status (Barras de Progresso) */
        .status-painel {
            margin-bottom: 25px;
            background: #eef7e9;
            padding: 18px;
            border-radius: 14px;
            border: 1px solid #d4e8c9;
        }

        .status-item {
            margin-bottom: 18px;
        }

        .status-label {
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            color: #3f5f2f;
        }

        .barra-fundo {
            background-color: #dce9d6;
            border-radius: 12px;
            height: 20px;
            width: 100%;
            overflow: hidden;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.08);
        }

        .barra-preenchimento {
            height: 100%;
            width: 50%; /* Começa na metade */
            transition: width 0.5s ease;
        }

        /* Cores das Barras */
        #solo-barra { background-color: #7d5a32; }
        #producao-barra { background-color: #3f7d2e; }
        #ambiente-barra { background-color: #2f8f6b; }

        /* Seção de Decisões */
        .decisoes-secao {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .decisao-bloco {
            border-left: 5px solid #4a7c31;
            padding-left: 16px;
            background: rgba(237, 250, 233, 0.9);
            border-radius: 12px;
            padding: 16px;
        }

        .decisao-bloco h4 {
            margin: 0 0 10px 0;
            color: #3d682f;
            font-size: 1.05rem;
        }

        .botoes-grupo {
            display: flex;
            gap: 12px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 6px 14px rgba(70, 93, 46, 0.12);
        }

        button:hover {
            transform: translateY(-1px);
        }

        .btn-sustentavel {
            background-color: #a2d189;
            color: #27481f;
        }

        .btn-sustentavel:hover { background-color: #89c26a; }

        .btn-comum {
            background-color: #e7b06a;
            color: #6a3d0f;
        }

        .btn-comum:hover { background-color: #d89f53; }

        /* Mensagem de Feedback */
        #feedback {
            margin-top: 22px;
            padding: 14px;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
            background-color: #f5f8ef;
            color: #3c5529;
            border: 1px solid #d7e6c9;
        }
    </style>
</head>
<body>

    <header>
        <h1>Simulador Agro Sustentável</h1>
        <p>Agrinho 2026: Equilíbrio entre Produção e Meio Ambiente</p>
        <p>Rafaela Patricia</p>
    </header>

    <div class="simulador-container">
        
        <div class="status-painel">
            <div class="status-item">
                <div class="status-label"><span>Saúde do Solo:</span> <span id="solo-txt">50%</span></div>
                <div class="barra-fundo"><div id="solo-barra" class="barra-preenchimento"></div></div>
            </div>
            
            <div class="status-item">
                <div class="status-label"><span>Produção de Alimentos:</span> <span id="producao-txt">50%</span></div>
                <div class="barra-fundo"><div id="producao-barra" class="barra-preenchimento"></div></div>
            </div>

            <div class="status-item">
                <div class="status-label"><span>Preservação Ambiental:</span> <span id="ambiente-txt">50%</span></div>
                <div class="barra-fundo"><div id="ambiente-barra" class="barra-preenchimento"></div></div>
            </div>
        </div>

        <div class="decisoes-secao">
            
            <div class="decisao-bloco">
                <h4>1. Método de Plantio</h4>
                <div class="botoes-grupo">
                    <button class="btn-sustentavel" onclick="tomarDecisao('direto')">Plantio Direto (Tecnológico)</button>
                    <button class="btn-comum" onclick="tomarDecisao('tradicional')">Arado Tradicional</button>
                </div>
            </div>

            <div class="decisao-bloco">
                <h4>2. Irrigação</h4>
                <div class="botoes-grupo">
                    <button class="btn-sustentavel" onclick="tomarDecisao('sensores')">Sensores IoT + Gotejamento</button>
                    <button class="btn-comum" onclick="tomarDecisao('aspersao')">Aspersão Contínua</button>
                </div>
            </div>

            <div class="decisao-bloco">
                <h4>3. Controle de Pragas</h4>
                <div class="botoes-grupo">
                    <button class="btn-sustentavel" onclick="tomarDecisao('drone')">Drones + Controle Biológico</button>
                    <button class="btn-comum" onclick="tomarDecisao('quimico')">Agrotóxico Geral</button>
                </div>
            </div>

        </div>

        <div id="feedback">Tome suas decisões para equilibrar a fazenda!</div>

    </div>

    <script>
        // Valores iniciais das barras (em porcentagem)
        let solo = 50;
        let producao = 50;
        let ambiente = 50;

        // Função que atualiza os elementos visuais na tela
        function atualizarTela() {
            // Garante que os valores fiquem entre 0 e 100
            solo = Math.max(0, Math.min(100, solo));
            producao = Math.max(0, Math.min(100, producao));
            ambiente = Math.max(0, Math.min(100, ambiente));

            // Atualiza o tamanho das barras de progresso
            document.getElementById('solo-barra').style.width = solo + '%';
            document.getElementById('producao-barra').style.width = producao + '%';
            document.getElementById('ambiente-barra').style.width = ambiente + '%';

            // Atualiza os textos de porcentagem
            document.getElementById('solo-txt').innerText = solo + '%';
            document.getElementById('producao-txt').innerText = producao + '%';
            document.getElementById('ambiente-txt').innerText = ambiente + '%';

            // Verifica se o jogador alcançou o equilíbrio perfeito
            if (solo >= 70 && producao >= 70 && ambiente >= 70) {
                document.getElementById('feedback').style.backgroundColor = "#d4edda";
                document.getElementById('feedback').style.color = "#155724";
                document.getElementById('feedback').innerText = "🏆 Incrível! Você alcançou o equilíbrio perfeito entre produção e sustentabilidade!";
            }
        }

        // Função que processa os cliques nos botões
        function tomarDecisao(tipo) {
            let textoFeedback = "";

            if (tipo === 'direto') {
                solo += 20; ambiente += 10; producao += 5;
                textoFeedback = "🌱 Plantio Direto protegeu o solo contra erosão e manteve a umidade!";
            } else if (tipo === 'tradicional') {
                solo -= 20; producao += 15; ambiente -= 10;
                textoFeedback = "🚜 O arado acelerou o plantio, mas desgastou a estrutura da terra a longo prazo.";
            } else if (tipo === 'sensores') {
                ambiente += 20; solo += 5;
                textoFeedback = "💧 Sensores detectaram a umidade exata e economizaram muita água!";
            } else if (tipo === 'aspersao') {
                ambiente -= 20; producao += 10;
                textoFeedback = "💦 A irrigação por aspersão gastou água em excesso e gerou poças no solo.";
            } else if (tipo === 'drone') {
                ambiente += 25; solo += 10; producao += 10;
                textoFeedback = "🛸 Drones mapearam as pragas e aplicaram o controle biológico cirurgicamente!";
            } else if (tipo === 'quimico') {
                ambiente -= 30; solo -= 15; producao += 20;
                textoFeedback = "⚠️ Agrotóxicos químicos eliminaram as pragas rápido, mas afetaram o solo e a biodiversidade local.";
            }

            // Atualiza o texto do feedback
            document.getElementById('feedback').style.backgroundColor = "#f1f1f1";
            document.getElementById('feedback').style.color = "#333";
            document.getElementById('feedback').innerText = textoFeedback;

            // Roda a função para redesenhar as barras modificadas
            atualizarTela();
        }

        // Executa uma vez no início para desenhar o estado inicial de 50%
        atualizarTela();
    </script>
</body>
</html>
